system:
  name: VMA_RUNTIME
  codename: VMA_USCP_CONTINUITY_PROOF
  version: 0.1.0
  mode: isolated_runtime_mvp

scope:
  includes:
    - detect_structure
    - map_topology
    - inject_anchors
    - estimate_cognitive_load
    - recover
    - process_turn
  excludes:
    - ui
    - dashboard
    - cloud
    - saas
    - existing_module_refactor

runtime_state:
  active: boolean
  mode: string
  current_topic: string
  current_layer: string
  parent_context: string
  active_objective: string
  known_hierarchy: array
  dependency_chain: array
  compression_level: string
  cognitive_load: number
  continuity_score: number
  topology_retention_score: number
  recovery_efficiency: number
  hierarchy_stability: number
  visual_reentry_required: boolean
  recursive_stability: string
  last_stable_anchor: string
  recovery_required: boolean

pipeline:
  - detect_structure
  - map_topology
  - inject_anchors
  - estimate_cognitive_load
  - recover_if_required
  - process_turn

outputs:
  voice_stable_output: string
  state: object
  structure: object
  topology: object
  anchors: object
  telemetry: object
  continuity_report_json: object
  continuity_summary_markdown: string
  continuity_state_update: object

benchmark:
  name: FIRST_REAL_CONTINUITY_WIN
  minimum_duration_minutes: 5
  criteria:
    topology_retention_score_min: 0.80
    recovery_efficiency_min: 0.70
    recursive_stability: stable
    visual_reentry_required: false

safety:
  autonomous_decisions: false
  auto_remediation: false
  external_side_effects: false
  operator_authority_required: true
